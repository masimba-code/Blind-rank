<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BlindRank — Head-to-Head Ranker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
–bg:      #0d0d0d;
–surface: #161616;
–card:    #1e1e1e;
–border:  #2a2a2a;
–border2: #3a3a3a;
–ink:     #f0ede6;
–ink2:    #888480;
–ink3:    #555250;
–accent:  #e8ff47;
–red:     #ff4040;
–max:     480px;
–r:       10px;
}

html { background: var(–bg); }
body {
min-height: 100vh;
background: var(–bg);
color: var(–ink);
font-family: ‘DM Mono’, ‘Courier New’, monospace;
display: flex;
justify-content: center;
align-items: flex-start;
}

#app {
width: 100%;
max-width: var(–max);
min-height: 100vh;
display: flex;
flex-direction: column;
border-left: 1px solid var(–border);
border-right: 1px solid var(–border);
}

@media (min-width: 520px) {
#app { box-shadow: 0 0 80px rgba(0,0,0,0.7); }
body { background: #050505; }
}

.screen { display:none; flex-direction:column; width:100%; flex:1; }
.screen.active { display:flex; }

/* ── SETUP ── */
#setup-screen { background: var(–bg); }

.s-header {
padding: 52px 28px 24px;
border-bottom: 1px solid var(–border);
}
.s-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 80px; line-height: 0.9; letter-spacing: 0.02em;
}
.s-logo em { color: var(–accent); font-style: normal; }
.s-tagline { font-size: 10px; letter-spacing: 0.25em; color: var(–ink3); text-transform: uppercase; margin-top: 10px; }

.s-sec { padding: 24px 28px 0; }
.s-lbl {
font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
color: var(–ink3); margin-bottom: 12px;
display: flex; align-items: center; gap: 8px;
}
.badge {
background: var(–accent); color: #0d0d0d;
font-size: 9px; font-weight: 500;
padding: 2px 8px; border-radius: 20px; letter-spacing: 0.05em;
}

.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mode-tile {
background: var(–surface); border: 1.5px solid var(–border);
border-radius: var(–r); padding: 16px 12px;
cursor: pointer; text-align: center; user-select: none;
transition: border-color 0.15s, background 0.15s, transform 0.1s;
}
.mode-tile:active { transform: scale(0.96); }
.mode-tile.on { border-color: var(–accent); background: rgba(232,255,71,0.06); }
.m-icon { font-size: 28px; display: block; margin-bottom: 8px; }
.m-name { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(–ink); }
.m-desc { font-size: 9px; color: var(–ink3); margin-top: 3px; line-height: 1.6; }

.items-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.item-row {
display: flex; align-items: center; gap: 12px;
background: var(–surface); border: 1px solid var(–border);
border-radius: 8px; padding: 10px 12px;
animation: fadeUp 0.2s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

.i-thumb { width:42px; height:42px; border-radius:6px; object-fit:cover; flex-shrink:0; border:1px solid var(–border2); }
.i-box {
width:42px; height:42px; border-radius:6px; flex-shrink:0;
background: var(–card); border: 1px solid var(–border2);
display:flex; align-items:center; justify-content:center; font-size:20px;
}
.i-info { flex:1; min-width:0; }
.i-name { font-size:12px; font-weight:500; color:var(–ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.i-meta { font-size:9px; color:var(–ink3); margin-top:2px; letter-spacing:0.1em; text-transform:uppercase; }
.i-del {
width:30px; height:30px; border-radius:50%; flex-shrink:0;
background:none; border:1px solid var(–border2); color:var(–ink3);
font-size:13px; cursor:pointer;
display:flex; align-items:center; justify-content:center; transition:all 0.12s;
}
.i-del:hover, .i-del:active { background:var(–red); color:#fff; border-color:var(–red); }

.add-sec { padding: 20px 28px; }

.drop-btn {
width:100%; padding:20px;
border: 1.5px dashed var(–border2); border-radius: var(–r);
background: var(–surface);
display:flex; align-items:center; justify-content:center; gap:10px;
cursor:pointer; transition:all 0.15s;
font-family:‘DM Mono’,monospace;
font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(–ink3);
}
.drop-btn:hover { border-color:var(–accent); color:var(–accent); }
.drop-btn:active { transform:scale(0.98); }

.irow { display:flex; gap:8px; margin-top:8px; }
.ti {
flex:1; padding:13px 14px;
border:1.5px solid var(–border); border-radius:8px;
background:var(–surface); font-family:‘DM Mono’,monospace;
font-size:13px; color:var(–ink); outline:none; transition:border-color 0.15s;
-webkit-appearance:none;
}
.ti:focus { border-color: var(–accent); }
.ti::placeholder { color: var(–ink3); }
.ti.em { width:54px; flex:none; text-align:center; font-size:22px; padding:13px 8px; }

.add-btn {
width:48px; height:48px; flex-shrink:0;
background:var(–accent); color:#0d0d0d;
border:none; border-radius:8px; font-size:24px; font-weight:700;
cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.12s;
}
.add-btn:active { transform:scale(0.92); background:#d4eb38; }

.tab-row { display:flex; gap:6px; margin-bottom:10px; }
.tab-p {
flex:1; padding:9px; border:1.5px solid var(–border); border-radius:6px;
background:var(–surface); font-family:‘DM Mono’,monospace;
font-size:9px; letter-spacing:0.15em; text-transform:uppercase;
color:var(–ink3); cursor:pointer; text-align:center; transition:all 0.12s;
}
.tab-p.on { background:var(–accent); color:#0d0d0d; border-color:var(–accent); }

.start-wrap { padding:16px 28px 52px; margin-top:auto; }
.start-btn {
width:100%; padding:18px;
background:var(–accent); color:#0d0d0d; border:none;
border-radius:var(–r); font-family:‘DM Mono’,monospace;
font-size:12px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase;
cursor:pointer; transition:all 0.15s;
}
.start-btn:active { transform:scale(0.97); background:#d4eb38; }
.start-btn:disabled {
background:var(–surface); color:var(–ink3);
border:1px solid var(–border); cursor:not-allowed; transform:none;
}

input[type=file] { display:none; }

/* ── RANK ── */
#rank-screen { background:var(–bg); min-height:100vh; }

.r-bar {
display:flex; align-items:center; gap:14px;
padding:16px 20px; border-bottom:1px solid var(–border); flex-shrink:0;
}
.r-logo { font-family:‘Bebas Neue’,sans-serif; font-size:24px; color:var(–ink); flex-shrink:0; }
.r-pw { flex:1; }
.r-pt { height:3px; background:var(–border); border-radius:2px; }
.r-pf { height:100%; background:var(–accent); border-radius:2px; transition:width 0.4s ease; }
.r-pn { font-size:9px; color:var(–ink3); margin-top:5px; text-align:right; letter-spacing:0.1em; }
.r-x { background:none; border:none; color:var(–ink3); font-size:18px; cursor:pointer; padding:4px; flex-shrink:0; transition:color 0.12s; }
.r-x:hover { color:var(–red); }

.match-area {
flex:1; display:flex; flex-direction:column;
align-items:center; justify-content:center;
padding:16px 20px; gap:10px;
}

.mc {
width:100%; flex:1;
border-radius:var(–r); border:1.5px solid var(–border);
background:var(–card); box-shadow:0 8px 32px rgba(0,0,0,0.4);
cursor:pointer; transition:transform 0.1s, box-shadow 0.1s, border-color 0.15s;
position:relative; overflow:hidden; display:flex; flex-direction:column;
max-height:36vh; min-height:120px;
}
.mc:active { transform:scale(0.975); box-shadow:0 2px 12px rgba(0,0,0,0.3); }
.mc.flash { animation:ring 0.28s ease; }
@keyframes ring {
0%   { border-color:var(–border); }
40%  { border-color:var(–accent); box-shadow:0 0 0 3px rgba(232,255,71,0.25); }
100% { border-color:var(–border); }
}

.mc.is-photo img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; user-select:none; }

.mc.is-text { align-items:center; justify-content:center; padding:24px 20px; gap:10px; }
.tc-em { font-size:42px; line-height:1; }
.tc-tx { font-size:20px; font-weight:500; color:var(–ink); text-align:center; line-height:1.4; word-break:break-word; }

.mc-img { width:100%; flex:1; object-fit:cover; display:block; min-height:80px; }
.mc-lbl { padding:10px 14px; font-size:12px; font-weight:500; color:var(–ink); border-top:1px solid var(–border); background:var(–card); flex-shrink:0; }

.pick-b {
position:absolute; top:10px; right:10px;
background:rgba(13,13,13,0.75); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
border:1px solid var(–border2); border-radius:20px;
padding:4px 10px; font-size:9px; letter-spacing:0.2em; text-transform:uppercase;
color:var(–ink3); pointer-events:none;
}

.vs-line { display:flex; align-items:center; gap:10px; flex-shrink:0; width:100%; }
.vs-r { flex:1; height:1px; background:var(–border); }
.vs-t { font-family:‘Bebas Neue’,sans-serif; font-size:18px; color:var(–ink3); letter-spacing:0.1em; }

.r-ctrl { padding:10px 20px; display:flex; gap:8px; flex-shrink:0; }
.cb {
flex:1; padding:15px 8px; border-radius:8px; border:none;
font-family:‘DM Mono’,monospace; font-size:9px; font-weight:500;
letter-spacing:0.12em; text-transform:uppercase; cursor:pointer;
display:flex; flex-direction:column; align-items:center; gap:5px; transition:all 0.12s;
background:var(–surface); color:var(–ink2); border:1.5px solid var(–border);
}
.cb .ci { font-size:20px; line-height:1; }
.cb:active { transform:scale(0.94); }
.cb.sm { flex: 0 0 56px; }

.r-hint { padding:8px 20px 20px; text-align:center; flex-shrink:0; }
.r-hint p { font-size:9px; letter-spacing:0.18em; color:var(–ink3); text-transform:uppercase; }

/* ── RESULTS ── */
#results-screen { background:var(–bg); }

.res-hd {
padding:40px 28px 24px;
border-bottom:1px solid var(–border);
}
.res-ttl {
font-family:‘Bebas Neue’,sans-serif;
font-size:68px; line-height:0.9; letter-spacing:0.02em;
}
.res-ttl em { color:var(–accent); font-style:normal; }
.res-meta { font-size:9px; letter-spacing:0.25em; color:var(–ink3); text-transform:uppercase; margin-top:10px; }

.res-list { padding:20px 20px 0; display:flex; flex-direction:column; gap:8px; }

.res-row {
display:flex; align-items:center; gap:12px;
background:var(–surface); border:1px solid var(–border);
border-radius:var(–r); overflow:hidden;
animation:fadeUp 0.35s ease both;
}
.rn {
font-family:‘Bebas Neue’,sans-serif; font-size:40px;
width:52px; text-align:center; flex-shrink:0;
color:var(–border2); padding-left:4px;
}
.rn.g { color:var(–accent); }
.rn.s { color:#aaa; }
.rn.b { color:#cd7f32; }
.r-thumb { width:68px; height:68px; object-fit:cover; flex-shrink:0; }
.r-tbox { width:68px; height:68px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:28px; background:var(–card); }
.r-inf { flex:1; padding:12px 12px 12px 0; min-width:0; }
.r-nm { font-size:13px; font-weight:500; color:var(–ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.r-sc { font-size:10px; color:var(–ink3); margin-top:3px; letter-spacing:0.08em; }
.r-bg { height:2px; background:var(–border); border-radius:2px; margin-top:8px; }
.r-br { height:100%; border-radius:2px; background:var(–accent); width:0; transition:width 0.7s ease; }

.res-ft { padding:24px 28px 52px; display:flex; flex-direction:column; gap:8px; }
.rb {
width:100%; padding:16px; border-radius:8px; border:none;
font-family:‘DM Mono’,monospace; font-size:11px; font-weight:500;
letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; transition:all 0.12s;
}
.rb:active { transform:scale(0.97); }
.rb-p { background:var(–accent); color:#0d0d0d; }
.rb-p:active { background:#d4eb38; }
.rb-g { background:var(–surface); color:var(–ink2); border:1.5px solid var(–border); }
.rb-g:active { background:var(–card); }
</style>

</head>
<body>
<div id="app">

<!-- SETUP -->

<div id="setup-screen" class="screen active">
  <div class="s-header">
    <div class="s-logo">BLIND<em>RANK</em></div>
    <div class="s-tagline">Head-to-head · ELO scoring · Any type</div>
  </div>

  <div class="s-sec">
    <div class="s-lbl">Mode</div>
    <div class="mode-grid">
      <div class="mode-tile on" data-mode="photo" onclick="pickMode('photo')">
        <span class="m-icon">🖼️</span>
        <div class="m-name">Photos</div>
        <div class="m-desc">From your gallery</div>
      </div>
      <div class="mode-tile" data-mode="text" onclick="pickMode('text')">
        <span class="m-icon">💬</span>
        <div class="m-name">Text</div>
        <div class="m-desc">Names, ideas, options</div>
      </div>
      <div class="mode-tile" data-mode="mixed" onclick="pickMode('mixed')">
        <span class="m-icon">🗂️</span>
        <div class="m-name">Mixed</div>
        <div class="m-desc">Photos + labels</div>
      </div>
      <div class="mode-tile" data-mode="custom" onclick="pickMode('custom')">
        <span class="m-icon">✏️</span>
        <div class="m-name">Custom</div>
        <div class="m-desc">Emoji + text</div>
      </div>
    </div>
  </div>

  <div class="add-sec">
    <div id="ui-photo">
      <button class="drop-btn" onclick="document.getElementById('fi-photo').click()">
        <span>📷</span><span>Add photos from gallery</span>
      </button>
      <input type="file" id="fi-photo" accept="image/*" multiple>
    </div>
    <div id="ui-text" style="display:none">
      <div class="irow">
        <input class="ti" id="ti-text" placeholder="Type an option…" maxlength="80">
        <button class="add-btn" onclick="addText()">+</button>
      </div>
    </div>
    <div id="ui-mixed" style="display:none">
      <button class="drop-btn" onclick="document.getElementById('fi-mixed').click()">
        <span>📷</span><span>Add photos</span>
      </button>
      <input type="file" id="fi-mixed" accept="image/*" multiple>
      <div class="irow">
        <input class="ti" id="ti-mixed" placeholder="Or type a text item…" maxlength="60">
        <button class="add-btn" onclick="addMixedText()">+</button>
      </div>
    </div>
    <div id="ui-custom" style="display:none">
      <div class="tab-row">
        <div class="tab-p on" id="tp-emoji" onclick="setCtab('emoji')">Emoji + Text</div>
        <div class="tab-p" id="tp-plain" onclick="setCtab('plain')">Text only</div>
      </div>
      <div class="irow">
        <input class="ti em" id="ci-emoji" placeholder="😀" maxlength="4">
        <input class="ti" id="ci-text" placeholder="Label…" maxlength="60">
        <button class="add-btn" onclick="addCustom()">+</button>
      </div>
    </div>
  </div>

  <div class="s-sec" style="flex:1;min-height:0;overflow-y:auto;padding-bottom:16px;">
    <div class="s-lbl">Items <span class="badge" id="cnt">0</span></div>
    <div class="items-list" id="ilist"></div>
  </div>

  <div class="start-wrap">
    <button class="start-btn" id="start-btn" disabled onclick="startRanking()">
      Add at least 2 items
    </button>
  </div>
</div>

<!-- RANK -->

<div id="rank-screen" class="screen">
  <div class="r-bar">
    <div class="r-logo">RANK</div>
    <div class="r-pw">
      <div class="r-pt"><div class="r-pf" id="pfill" style="width:0%"></div></div>
      <div class="r-pn" id="ptxt">0 / 0</div>
    </div>
    <button class="r-x" onclick="confirmQuit()">✕</button>
  </div>

  <div class="match-area" id="match-area">
    <div class="mc" id="card-a"></div>
    <div class="vs-line"><div class="vs-r"></div><div class="vs-t">VS</div><div class="vs-r"></div></div>
    <div class="mc" id="card-b"></div>
  </div>

  <div class="r-ctrl">
    <button class="cb sm" onclick="undoLast()"><span class="ci">↩</span><span>undo</span></button>
    <button class="cb" onclick="voteTie()"><span class="ci">🤝</span><span>tie</span></button>
    <button class="cb" onclick="skipMatch()"><span class="ci">⟳</span><span>skip</span></button>
  </div>
  <div class="r-hint"><p>Tap a card to pick your favourite</p></div>
</div>

<!-- RESULTS -->

<div id="results-screen" class="screen">
  <div class="res-hd">
    <div class="res-ttl">THE<br><em>VERDICT</em></div>
    <div class="res-meta" id="rmeta">— matchups complete</div>
  </div>
  <div class="res-list" id="rlist"></div>
  <div class="res-ft">
    <button class="rb rb-p" onclick="rankAgain()">Rank Again</button>
    <button class="rb rb-g" onclick="showScreen('setup-screen')">Add / Change Items</button>
    <button class="rb rb-g" onclick="exportResults()">Export Results</button>
    <button class="rb rb-g" onclick="hardReset()">Start Over</button>
  </div>
</div>

</div>

<script>
let mode='photo', ctab='emoji';
let items=[], scores={}, matchups=[], history=[], skipped=[];
let currentM=0, doneCount=0, idCtr=0;
const K=32, ELO0=1000;

function pickMode(m) {
  mode=m;
  document.querySelectorAll('.mode-tile').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));
  ['photo','text','mixed','custom'].forEach(id=>{
    document.getElementById('ui-'+id).style.display=id===m?'':'none';
  });
}

document.getElementById('fi-photo').addEventListener('change',e=>{handleFiles(Array.from(e.target.files),'photo');e.target.value='';});
document.getElementById('fi-mixed').addEventListener('change',e=>{handleFiles(Array.from(e.target.files),'mixed');e.target.value='';});

async function handleFiles(files,type){
  for(const f of files){
    const src=await toB64(f);
    const label=f.name.replace(/\.[^.]+$/,'');
    push({type,src,label,emoji:null});
  }
}
function toB64(f){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(f);});}

document.getElementById('ti-text').addEventListener('keydown',e=>{if(e.key==='Enter')addText();});
function addText(){const v=document.getElementById('ti-text').value.trim();if(!v)return;push({type:'text',src:null,label:v,emoji:'💬'});document.getElementById('ti-text').value='';}

document.getElementById('ti-mixed').addEventListener('keydown',e=>{if(e.key==='Enter')addMixedText();});
function addMixedText(){const v=document.getElementById('ti-mixed').value.trim();if(!v)return;push({type:'text',src:null,label:v,emoji:'📝'});document.getElementById('ti-mixed').value='';}

document.getElementById('ci-text').addEventListener('keydown',e=>{if(e.key==='Enter')addCustom();});
function addCustom(){
  const label=document.getElementById('ci-text').value.trim();if(!label)return;
  const emoji=ctab==='emoji'?(document.getElementById('ci-emoji').value.trim()||'🔷'):null;
  push({type:'custom',src:null,label,emoji});
  document.getElementById('ci-text').value='';document.getElementById('ci-emoji').value='';
}
function setCtab(t){
  ctab=t;
  document.getElementById('tp-emoji').classList.toggle('on',t==='emoji');
  document.getElementById('tp-plain').classList.toggle('on',t==='plain');
  document.getElementById('ci-emoji').style.display=t==='emoji'?'':'none';
}

function push(item){
  item.id='I'+(++idCtr);items.push(item);scores[item.id]=ELO0;
  renderList();updateBtn();
}
function removeItem(id){
  items=items.filter(i=>i.id!==id);delete scores[id];renderList();updateBtn();
}
function renderList(){
  const list=document.getElementById('ilist');
  document.getElementById('cnt').textContent=items.length;
  list.innerHTML='';
  items.forEach((item,idx)=>{
    const row=document.createElement('div');row.className='item-row';
    const th=item.src?`<img class="i-thumb" src="${item.src}" alt="">`:`<div class="i-box">${item.emoji||'📝'}</div>`;
    row.innerHTML=`${th}<div class="i-info"><div class="i-name">${x(item.label)}</div><div class="i-meta">#${idx+1} · ${item.type}</div></div><button class="i-del" onclick="removeItem('${item.id}')">✕</button>`;
    list.appendChild(row);
  });
}
function updateBtn(){
  const btn=document.getElementById('start-btn'),n=items.length;
  if(n<2){btn.disabled=true;btn.textContent='Add at least 2 items';}
  else{btn.disabled=false;const p=n*(n-1)/2;btn.textContent=`Start → ${n} items · ${p} matchups`;}
}

function genMatchups(ids){
  const p=[];
  for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++)p.push([ids[i],ids[j]]);
  for(let i=p.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}
  return p;
}

function startRanking(){
  if(items.length<2)return;
  items.forEach(i=>scores[i.id]=ELO0);
  matchups=genMatchups(items.map(i=>i.id));
  currentM=0;doneCount=0;history=[];skipped=[];
  showScreen('rank-screen');loadMatch();
}

function loadMatch(){
  while(currentM<matchups.length&&skipped.includes(currentM))currentM++;
  if(currentM>=matchups.length){
    if(skipped.length){skipped.forEach(i=>matchups.push(matchups[i]));skipped=[];}
    else{showResults();return;}
  }
  const total=matchups.length,pct=Math.round((doneCount/total)*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('ptxt').textContent=`${doneCount} / ${total}`;
  const[idA,idB]=matchups[currentM];
  buildCard('card-a',items.find(i=>i.id===idA));
  buildCard('card-b',items.find(i=>i.id===idB));
  document.getElementById('card-a').onclick=()=>vote('a');
  document.getElementById('card-b').onclick=()=>vote('b');
}

function buildCard(cid,item){
  const card=document.getElementById(cid);
  card.className='mc';card.innerHTML='';if(!item)return;
  if(item.src&&item.type==='photo'){
    card.classList.add('is-photo');
    card.innerHTML=`<img src="${item.src}" alt="${x(item.label)}"><div class="pick-b">Tap to pick</div>`;
  }else if(item.src&&item.type==='mixed'){
    card.classList.add('is-photo');
    card.innerHTML=`<img class="mc-img" src="${item.src}" alt="${x(item.label)}"><div class="mc-lbl">${x(item.label)}</div><div class="pick-b">Tap to pick</div>`;
  }else{
    card.classList.add('is-text');
    card.innerHTML=`<div class="tc-em">${item.emoji||'💬'}</div><div class="tc-tx">${x(item.label)}</div><div class="pick-b">Tap to pick</div>`;
  }
}

function vote(side){
  const[idA,idB]=matchups[currentM];
  const wId=side==='a'?idA:idB,lId=side==='a'?idB:idA;
  history.push({m:currentM,idA,idB,sA:scores[idA],sB:scores[idB]});
  const[nW,nL]=eloWin(scores[wId],scores[lId]);
  scores[wId]=nW;scores[lId]=nL;
  document.getElementById('card-'+side).classList.add('flash');
  doneCount++;currentM++;setTimeout(loadMatch,220);
}

function voteTie(){
  const[idA,idB]=matchups[currentM];
  history.push({m:currentM,idA,idB,sA:scores[idA],sB:scores[idB]});
  const[nA,nB]=eloTie(scores[idA],scores[idB]);
  scores[idA]=nA;scores[idB]=nB;doneCount++;currentM++;loadMatch();
}
function skipMatch(){skipped.push(currentM);currentM++;loadMatch();}
function undoLast(){
  if(!history.length)return;
  const h=history.pop();scores[h.idA]=h.sA;scores[h.idB]=h.sB;
  if(doneCount>0)doneCount--;currentM=h.m;loadMatch();
}
function confirmQuit(){if(confirm('Quit? Progress will be lost.'))showScreen('setup-screen');}

function eloWin(ws,ls){const e=1/(1+Math.pow(10,(ls-ws)/400));return[Math.round(ws+K*(1-e)),Math.round(ls+K*(0-(1-e)))];}
function eloTie(sA,sB){const e=1/(1+Math.pow(10,(sB-sA)/400));return[Math.round(sA+K*(0.5-e)),Math.round(sB+K*(0.5-(1-e)))];}

function showResults(){
  const sorted=items.map(i=>({...i,score:scores[i.id]})).sort((a,b)=>b.score-a.score);
  const maxS=sorted[0].score,minS=sorted[sorted.length-1].score,range=maxS-minS||1;
  document.getElementById('rmeta').textContent=`${doneCount} matchups · ${items.length} items`;
  const list=document.getElementById('rlist');list.innerHTML='';
  const medals=['🥇','🥈','🥉'],cls=['g','s','b'];
  sorted.forEach((item,i)=>{
    const pct=Math.round(((item.score-minS)/range)*100);
    const row=document.createElement('div');row.className='res-row';row.style.animationDelay=`${i*0.06}s`;
    const th=item.src?`<img class="r-thumb" src="${item.src}" alt="">`:`<div class="r-tbox">${item.emoji||'💬'}</div>`;
    row.innerHTML=`<div class="rn ${cls[i]||''}">${medals[i]||(i+1)}</div>${th}<div class="r-inf"><div class="r-nm">${x(item.label)}</div><div class="r-sc">${item.score} ELO</div><div class="r-bg"><div class="r-br" data-p="${pct}"></div></div></div>`;
    list.appendChild(row);
  });
  showScreen('results-screen');
  document.getElementById('results-screen').scrollTop=0;
  setTimeout(()=>{list.querySelectorAll('.r-br').forEach(b=>b.style.width=b.dataset.p+'%');},80);
}

function rankAgain(){
  items.forEach(i=>scores[i.id]=ELO0);
  matchups=genMatchups(items.map(i=>i.id));
  currentM=0;doneCount=0;history=[];skipped=[];
  showScreen('rank-screen');loadMatch();
}
function exportResults(){
  const sorted=items.map(i=>({...i,score:scores[i.id]})).sort((a,b)=>b.score-a.score);
  const text=sorted.map((it,i)=>`#${i+1} ${it.label} — ${it.score} ELO`).join('\n');
  if(navigator.share)navigator.share({title:'BlindRank Results',text});
  else if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>alert('Copied!'));
  else alert(text);
}
function hardReset(){
  items=[];scores={};matchups=[];idCtr=0;currentM=0;doneCount=0;history=[];skipped=[];
  renderList();updateBtn();showScreen('setup-screen');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function x(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

pickMode('photo');updateBtn();
</script>
